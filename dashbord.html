
<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
</head>

<body>

    <h1>Dashboard</h1>

    <h3>Create Transaction</h3>

    <form id="transactionForm">
        <input type="text" placeholder="Buyer Name" id="buyer" required><br><br>
        <input type="text" placeholder="Seller Name" id="seller" required><br><br>
        <input type="number" placeholder="Amount" id="amount" required><br><br>

        <button type="submit">Create</button>
    </form>

    <h3>Transactions</h3>
    <ul id="transactions"></ul>

    <script>
        let transactions = [];

        document.getElementById("transactionForm").addEventListener("submit", function (e) {
            e.preventDefault();

            let buyer = document.getElementById("buyer").value;
            let seller = document.getElementById("seller").value;
            let amount = document.getElementById("amount").value;

            let transaction = {
                buyer,
                seller,
                amount,
                status: "Pending"
            };

            transactions.push(transaction);
            displayTransactions();
        });

        function displayTransactions() {
            let list = document.getElementById("transactions");
            list.innerHTML = "";

            transactions.forEach((t, index) => {
                let li = document.createElement("li");

                li.innerHTML = `
            ${t.buyer} → ${t.seller} : $${t.amount} [${t.status}]
            <button onclick="release(${index})">Release</button>
        `;

                list.appendChild(li);
            });
        }

        function release(index) {
            transactions[index].status = "Completed";
            displayTransactions();
        }
    </script>

</body>

</html>
